---
deployment:
  tasks:
    - export DEPLOYPATH=/home/helpkpcg/public_html/

    # Copy main PHP pages to the live domain folder
    - /bin/cp -f index.php $DEPLOYPATH
    - /bin/cp -f about.php $DEPLOYPATH
    - /bin/cp -f contact.php $DEPLOYPATH
    - /bin/cp -f services.php $DEPLOYPATH
    - /bin/cp -f training.php $DEPLOYPATH
    - /bin/cp -f employers.php $DEPLOYPATH
    - /bin/cp -f job-seekers.php $DEPLOYPATH
    - /bin/cp -f jobs.php $DEPLOYPATH
    - /bin/cp -f send-mail.php $DEPLOYPATH

    # Copy Composer/PHPMailer vendor folder if it exists
    - /bin/cp -Rf vendor $DEPLOYPATH

    # Create storage folder on live server
    - /bin/mkdir -p ${DEPLOYPATH}storage

    # Set safe permissions
    - /bin/chmod 755 ${DEPLOYPATH}storage